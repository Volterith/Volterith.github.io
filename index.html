<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volterith | Windows Live Profile</title>
    <style>
        :root {
            --msn-blue: #004693;
            --msn-light-blue: #0078d7;
            --aero-bg: rgba(255, 255, 255, 0.88);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body {
            background: #003366 url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        /* Окно Aero */
        .window {
            width: 100%;
            max-width: 940px;
            background: var(--aero-bg);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Шапка с новой бабочкой */
        .window-header {
            background: linear-gradient(to bottom, #0078d7, #005a9e);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffba00;
            color: white;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .logo { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 15px; }
        .logo img { width: 24px; height: 24px; object-fit: contain; }

        /* Тело окна */
        .window-body {
            display: grid;
            grid-template-columns: 280px 1fr;
            padding: 25px;
            gap: 25px;
        }

        /* Профиль слева */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }

        .profile-card {
            background: white;
            border: 1px solid #b8b8b8;
            padding: 20px;
            text-align: center;
            border-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .avatar {
            width: 125px; height: 125px;
            margin: 0 auto 15px;
            border: 4px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            background: #eee;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .name { color: var(--msn-blue); font-weight: bold; font-size: 20px; }
        .sub-name { font-size: 11px; color: #777; margin-top: 5px; }

        /* Гаджет-таймер */
        .gadget {
            background: linear-gradient(135deg, #444, #111);
            color: white;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.1);
        }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .t-val { font-size: 18px; font-weight: bold; display: block; }
        .t-lab { font-size: 8px; opacity: 0.7; text-transform: uppercase; }

        /* Контент справа */
        .content { display: flex; flex-direction: column; gap: 25px; }

        .category-group { margin-bottom: 5px; }
        .category-title {
            font-size: 12px; font-weight: bold; color: #444;
            text-transform: uppercase; border-bottom: 1px solid #ccc;
            padding-bottom: 6px; margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        /* Кнопки ссылок */
        .link-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: linear-gradient(to bottom, #ffffff, #f2f2f2);
            border: 1px solid #bbb;
            border-radius: 3px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
        }
        .link-card:hover {
            border-color: #ffba00;
            background: #fff;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            transform: translateY(-1px);
        }
        .link-card img {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 2px;
            border: 1px solid #ddd;
        }
        .link-info b { display: block; font-size: 13px; color: var(--msn-blue); }
        .link-info small { font-size: 11px; color: #666; }

        /* Мобильная адаптация */
        @media (max-width: 800px) {
            .window-body { grid-template-columns: 1fr; padding: 15px; }
            .sidebar { order: 1; }
            .content { order: 2; }
            .avatar { width: 100px; height: 100px; }
            .links-grid { grid-template-columns: 1fr; }
            .window { border-radius: 0; border: none; }
            body { padding: 0; }
        }

        footer {
            padding: 12px; background: rgba(0,0,0,0.05);
            text-align: center; font-size: 11px; color: #555;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="window">
    <header class="window-header">
        <div class="logo">
            <img src="https://icons.iconseeker.com/png/fullsize/msn-buddy/msn-butterfly.png" alt="butterfly">
            Windows Live MSN
        </div>
        <div style="font-size: 11px; opacity: 0.9;">Volterith • Online</div>
    </header>

    <div class="window-body">
        <aside class="sidebar">
            <div class="profile-card">
                <div class="avatar" id="avatarContainer">
                    <img src="avatar.jpg" id="avatarImg" alt="Volterith" onerror="this.src='https://via.placeholder.com/125'">
                </div>
                <div class="name">Volterith</div>
                <p class="sub-name">«пишу, но не только код»</p>
            </div>

            <div class="gadget">
                <div style="font-size: 10px; font-weight: bold; letter-spacing: 1px;">BIRTHDAY</div>
                <div class="timer-grid">
                    <div><span class="t-val" id="days">00</span><span class="t-lab">дн</span></div>
                    <div><span class="t-val" id="hours">00</span><span class="t-lab">ч</span></div>
                    <div><span class="t-val" id="minutes">00</span><span class="t-lab">м</span></div>
                    <div><span class="t-val" id="seconds">00</span><span class="t-lab">с</span></div>
                </div>
            </div>
        </aside>

        <main class="content" id="main-content">
            <!-- Ссылки генерируются скриптом ниже -->
        </main>
    </div>

    <footer>© 2008 Microsoft Corporation. Все права защищены.</footer>
</div>

<script>
    // --- ВАШ СПИСОК ССЫЛОК ---
    const myLinks = [
        { category: "channels", title: "Душенька вещает", desc: "Telegram канал", url: "https://t.me/volterith_shelter", icon: "tg.jpg" },
        { category: "channels", title: "[щп] молчаливые архивы в которых не молчат", desc: "Вторичный архив", url: "https://t.me/+8CM3kqXfBHoxM2Zi", icon: "sp.jpg" },
        
        { category: "social", title: "GitHub", desc: "Мой код и проекты", url: "https://github.com/volterith", icon: "github.png" },
        { category: "social", title: "Enderverse RP", desc: "Discord сервер", url: "https://discord.gg/NehPEUyF9s", icon: "ev.webp" },
        
        { category: "projects", title: "Team Leaked", desc: "Co-owner", url: "https://t.me/utlc_community", icon: "tl.jpg" },
        { category: "projects", title: "Chaos Archive", desc: "Лор Enderverse", url: "https://t.me/charchive78", icon: "ca.jpg" }
    ];

    const categories = {
        channels: "Telegram-каналы",
        social: "Социальные сети",
        projects: "Мои проекты"
    };

    // Отрисовка контента
    const contentDiv = document.getElementById('main-content');
    
    Object.keys(categories).forEach(key => {
        const sectionLinks = myLinks.filter(l => l.category === key);
        if (sectionLinks.length > 0) {
            const group = document.createElement('div');
            group.className = 'category-group';
            group.innerHTML = `<div class="category-title">${categories[key]}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'links-grid';
            
            sectionLinks.forEach(link => {
                grid.innerHTML += `
                    <a href="${link.url}" target="_blank" class="link-card">
                        <img src="${link.icon}" onerror="this.src='https://icons.iconseeker.com/png/fullsize/msn-buddy/msn-butterfly.png'">
                        <div class="link-info">
                            <b>${link.title}</b>
                            <small>${link.desc}</small>
                        </div>
                    </a>
                `;
            });
            group.appendChild(grid);
            contentDiv.appendChild(group);
        }
    });

    // --- ЛОГИКА ТАЙМЕРА ---
    function updateCountdown() {
        const now = new Date();
        let target = new Date(now.getFullYear(), 3, 21); // 21 апреля
        if (now > target) target = new Date(now.getFullYear() + 1, 3, 21);
        const diff = target - now;
        
        document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
        document.getElementById('hours').innerText = String(Math.floor((diff / 3600000) % 24)).padStart(2, '0');
        document.getElementById('minutes').innerText = String(Math.floor((diff / 60000) % 60)).padStart(2, '0');
        document.getElementById('seconds').innerText = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // --- PATPAT АНИМАЦИЯ ---
    const avatar = document.getElementById('avatarContainer');
    let isPatting = false;
    avatar.onclick = () => {
        if (isPatting) return;
        isPatting = true;
        const img = document.getElementById('avatarImg');
        const old = img.src;
        img.src = 'patpat.gif';
        setTimeout(() => { img.src = old; isPatting = false; }, 2000);
    };
</script>

</body>
</html>
